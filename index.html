<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucens</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 40px 16px;
      background: #081226;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      color: #e6edf3;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #9fb3c8;
      margin-bottom: 40px;
    }

    .app-card {
      background: #0d1b33;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .app-title {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .section {
      margin-top: 20px;
    }

    .section-title {
      font-size: 1rem;
      color: #7aa2ff;
      margin-bottom: 8px;
    }

    ul {
      padding-left: 18px;
      color: #cdd9e5;
    }

    a {
      color: #67b7ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 32px 0;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <h1>Lucens</h1>
    <p class="subtitle">
      간단하고 직관적인 모바일 앱과 게임을 만듭니다.<br>
      짧은 시간에도 즐길 수 있는 경험을 제공합니다.
    </p>

    <div id="apps"></div>

  </div>

  <script>
    fetch('content.md')
      .then(res => res.text())
      .then(md => {
        const sections = md.split('---');

        let html = '';

        sections.forEach(section => {
          if (section.includes('##')) {
            html += `<div class="app-card">${marked.parse(section)}</div>`;
          }
        });

        document.getElementById('apps').innerHTML = html;
      });
  </script>
</body>
</html>
